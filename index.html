  function b2a(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0)})}
  async function unlock(){
    var err=document.getElementById('err'); err.textContent='';
    var pw=document.getElementById('pw').value;
    try{
      var enc=new TextEncoder();
      var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey(
        {name:'PBKDF2',salt:b2a(SALT),iterations:100000,hash:'SHA-256'},
        km,{name:'AES-GCM',length:256},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
      var html=new TextDecoder().decode(pt);
      var doc=new DOMParser().parseFromString(html,'text/html');
      document.open();
      document.write('<!DOCTYPE html>', doc.documentElement.outerHTML);
      document.close();
    }catch(e){ err.textContent='Неверный пароль'; }
  }
  document.getElementById('go').addEventListener('click',unlock);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock()});
